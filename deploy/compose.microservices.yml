services:
  producer-service:
    image: ${DOCKERHUB_USERNAME}/producer-service:${IMAGE_TAG:-latest}
    container_name: producer-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      AZURE_ISSUER_URI: ${AZURE_ISSUER_URI}
      AZURE_JWK_SET_URI: ${AZURE_JWK_SET_URI}
      AZURE_AUDIENCE: ${AZURE_AUDIENCE}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      JAVA_TOOL_OPTIONS: "-Doracle.net.tns_admin=/app/src/main/resources/Wallet_MBD -Doracle.net.wallet_location=/app/src/main/resources/Wallet_MBD"
    networks:
      - curso-network

  consumer-service:
    image: ${DOCKERHUB_USERNAME}/consumer-service:${IMAGE_TAG:-latest}
    container_name: consumer-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      JAVA_TOOL_OPTIONS: "-Doracle.net.tns_admin=/app/src/main/resources/Wallet_MBD -Doracle.net.wallet_location=/app/src/main/resources/Wallet_MBD"
    networks:
      - curso-network

networks:
  curso-network:
    external: true